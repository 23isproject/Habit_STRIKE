<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habits STRIKE - Mobile Compact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1 class="text-center" style="color: var(--primary);">Habits STRIKE</h1>
        <p class="text-center" style="color: var(--text-muted);">โปรแกรมติดตามกิจวัตรและสะสมแต้มวินัย</p>

        <div class="user-setup-section">
            <label for="username">👤 ผู้ใช้:</label>
            <input type="text" id="username" value="Guest" placeholder="พิมพ์ชื่อของคุณ...">
            <button onclick="triggerSwitchUser()">โหลด</button>
        </div>

        <div id="main-workspace">
            <div class="header-status">
                <div class="status-left">
                    <h2>กิจวัตรของ: <span id="display-username" style="color: var(--primary);">Guest</span> ✨</h2>
                    <div class="system-day-badge">📅 ระบบอยู่ที่: วันที่ <span id="current-day-label">1</span></div>
                </div>
                <div class="right-badges">
                    <div class="total-points-badge">
                        รวม: <span id="total-points">0</span> Pts
                    </div>
                    <button class="next-day-btn" onclick="advanceToNextDay()">🗓️ ข้ามเป็นวันถัดไป</button>
                </div>
            </div>

            <div class="add-habit-form">
                <input type="text" id="habit-name-input" placeholder="เพิ่มกิจวัตรใหม่ที่นี่...">
                <button onclick="triggerAddHabit()" style="background: var(--success);">+ เพิ่ม</button>
            </div>

            <div id="habits-container"></div>

            <div class="report-section">
                <div class="summary-card monthly-card text-center">
                    <h3>🏆 สรุปผลรายเดือน (30 วัน)</h3>
                    <button onclick="triggerMonthlySummary()" style="background: var(--success); margin-top: 8px; padding: 6px 20px;">คำนวณสรุปสิ้นเดือน</button>
                    <div id="monthly-result-container" class="report-list" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
