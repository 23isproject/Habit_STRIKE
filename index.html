<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habits STRIKE - Mobile Compact</title>
    <style>
        /* ==========================================================================
           CSS: COMPACT MOBILE-FIRST STYLES
           ========================================================================== */
        :root {
            --bg-color: #0f172a;        
            --card-bg: #1e293b;         
            --card-sub-bg: #334155;     
            --primary: #3b82f6;         
            --success: #10b981;         
            --success-dark: #064e3b;    
            --accent: #f59e0b;          
            --danger: #ef4444;          
            --text: #f8fafc;            
            --text-muted: #94a3b8;      
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 10px; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px; 
            background: var(--card-bg);
            padding: 15px; 
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        h1 { font-size: 1.5rem; margin: 0 0 2px 0; }
        h2 { font-size: 1.1rem; margin: 0; }
        h3 { font-size: 1rem; margin: 0; }
        p { font-size: 0.8rem; margin: 0 0 15px 0; }

        .text-center { text-align: center; }

        .user-setup-section {
            display: flex;
            gap: 8px;
            align-items: center;
            background: var(--card-sub-bg);
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.85rem;
        }

        .user-setup-section label {
            white-space: nowrap;
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 8px 12px; 
            border-radius: 6px;
            border: 1px solid #475569;
            background: var(--bg-color);
            color: white;
            box-sizing: border-box;
            font-size: 0.85rem; 
        }

        input[type="text"]:focus {
            outline: 2px solid var(--primary);
        }

        button {
            padding: 8px 14px; 
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.85rem; 
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        button:hover { background: #2563eb; }
        button:active { transform: scale(0.98); }

        .header-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--card-sub-bg);
            padding-bottom: 10px;
            margin-bottom: 15px;
            gap: 10px;
        }

        .total-points-badge {
            background: var(--accent);
            color: #000;
            padding: 4px 10px; 
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .add-habit-form {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .add-habit-form input {
            flex: 1;
        }

        .habit-card {
            background: var(--card-sub-bg);
            border-radius: 10px;
            padding: 12px; 
            margin-bottom: 15px;
        }

        .habit-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .streak-info {
            font-size: 0.75rem; 
        }

        .streak-count {
            color: #f43f5e; 
            font-weight: bold;
        }

        .habit-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .point-multiplier {
            background: #475569;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--accent);
            font-weight: bold;
        }

        .delete-habit-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 4px 8px; 
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .delete-habit-btn:hover { background: #dc2626; }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr); 
            gap: 6px;
            margin-bottom: 5px;
        }

        .day-box {
            aspect-ratio: 1;
            background: var(--card-bg);
            border: 1px solid #475569;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 0.7rem; 
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .day-box:hover:not(.disabled):not(.completed) {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
        }

        .day-box.completed {
            background: var(--success);
            border-color: var(--success);
            color: white;
            cursor: default;
        }

        .day-box.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .day-box .pts {
            font-size: 0.55rem; 
            margin-top: 2px;
            font-weight: bold;
        }

        .report-section {
            margin-top: 20px;
        }

        .summary-card {
            padding: 15px;
            border-radius: 10px;
        }

        .monthly-card {
            background: var(--success-dark);
            border: 1px solid #047857;
        }

        .report-list {
            margin-top: 12px;
            text-align: left;
            background: rgba(0, 0, 0, 0.25);
            padding: 10px;
            border-radius: 6px;
            font-size: 0.8rem; 
        }

        .report-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .report-item:last-child { border-bottom: none; }

        /* RESPONSIVE MEDIA QUERIES */
        @media (max-width: 480px) {
            .days-grid { 
                grid-template-columns: repeat(5, 1fr); 
                gap: 4px;
            }
            .user-setup-section, .add-habit-form, .header-status, .habit-header {
                flex-direction: column;
                align-items: stretch;
                gap: 6px;
            }
            .habit-actions {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="text-center" style="color: var(--primary);">Habits STRIKE</h1>
        <p class="text-center" style="color: var(--text-muted);">โปรแกรมติดตามกิจวัตรและสะสมแต้มวินัย</p>

        <div class="user-setup-section">
            <label for="username">👤 ผู้ใช้:</label>
            <input type="text" id="username" value="Guest" placeholder="พิมพ์ชื่อของคุณ...">
            <button onclick="triggerSwitchUser()">โหลด</button>
        </div>

        <div id="main-workspace">
            <div class="header-status">
                <div>
                    <h2>กิจวัตรของ: <span id="display-username" style="color: var(--primary);">Guest</span> ✨</h2>
                </div>
                <div class="total-points-badge">
                    รวม: <span id="total-points">0</span> Pts
                </div>
            </div>

            <div class="add-habit-form">
                <input type="text" id="habit-name-input" placeholder="เพิ่มกิจวัตรใหม่ที่นี่...">
                <button onclick="triggerAddHabit()" style="background: var(--success);">+ เพิ่ม</button>
            </div>

            <div id="habits-container"></div>

            <div class="report-section">
                <div class="summary-card monthly-card text-center">
                    <h3>🏆 สรุปผลรายเดือน (30 วัน)</h3>
                    <button onclick="triggerMonthlySummary()" style="background: var(--success); margin-top: 8px; padding: 6px 20px;">คำนวณสรุปสิ้นเดือน</button>
                    <div id="monthly-result-container" class="report-list" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = "guest";
        let habits = [];
        
        // บังคับระบบเริ่มต้นระบบที่ "วันที่ 1" (index 0) ตามคำขอ
        window.currentSystemDayIndex = 0; 

        window.onload = function() {
            initApp();
        };

        function initApp() {
            const usernameInput = document.getElementById('username').value.trim();
            currentUser = usernameInput !== "" ? usernameInput.toLowerCase() : "guest";
            document.getElementById('display-username').innerText = usernameInput !== "" ? usernameInput : "Guest";
            clearReportBoard();
            loadUserData();
            renderHabits();
        }

        function triggerSwitchUser() {
            initApp();
        }

        function clearReportBoard() {
            document.getElementById('monthly-result-container').style.display = "none";
        }

        function saveUserData() {
            if (currentUser) {
                localStorage.setItem(`habits_strike_compact_${currentUser}`, JSON.stringify(habits));
            }
        }

        function loadUserData() {
            const savedData = localStorage.getItem(`habits_strike_compact_${currentUser}`);
            if (savedData) {
                habits = JSON.parse(savedData);
            } else {
                initSampleData();
            }
            updateTotalPoints();
        }

        function initSampleData() {
            // สร้าง Data เริ่มต้นแบบคลีนๆ ที่ยังไม่ได้กดเช็กอินสักวัน
            habits = [
                {
                    id: 1,
                    name: "ดื่มน้ำวันละ 2 ลิตร",
                    days: Array(30).fill(null),
                    historyPoints: Array(30).fill(0),
                    currentStreak: 0, 
                    nextEarnPoint: 5
                }
            ];
            saveUserData();
        }

        function triggerAddHabit() {
            const input = document.getElementById('habit-name-input');
            const name = input.value.trim();
            if(name === "") return;

            const newHabit = {
                id: Date.now(),
                name: name,
                days: Array(30).fill(null),
                historyPoints: Array(30).fill(0),
                currentStreak: 0,
                nextEarnPoint: 5 
            };

            habits.push(newHabit);
            input.value = "";
            saveUserData();
            updateTotalPoints();
            renderHabits();
            clearReportBoard();
        }

        function triggerDeleteHabit(habitId) {
            if (confirm(`คุณแน่ใจหรือไม่ว่าต้องการลบกิจวัตรนี้?`)) {
                habits = habits.filter(h => h.id !== habitId);
                saveUserData();
                updateTotalPoints();
                renderHabits();
                clearReportBoard(); 
            }
        }

        function renderHabits() {
            const container = document.getElementById('habits-container');
            container.innerHTML = "";

            if(habits.length === 0) {
                container.innerHTML = `<p class="text-center" style="color:var(--text-muted); padding: 10px; font-size:0.8rem;">ยังไม่มีกิจวัตรในตอนนี้</p>`;
                return;
            }

            habits.forEach(habit => {
                const card = document.createElement('div');
                card.className = 'habit-card';
                const habitTotalPoints = habit.historyPoints.reduce((a, b) => a + b, 0);

                let headerHTML = `
                    <div class="habit-header">
                        <div>
                            <h3>${habit.name}</h3>
                            <div class="streak-info">ทำต่อเนื่อง: <span class="streak-count">${habit.currentStreak} วัน</span> | รวม: ${habitTotalPoints} Pts</div>
                        </div>
                        <div class="habit-actions">
                            <div class="point-multiplier">+${habit.nextEarnPoint} Pts</div>
                            <button class="delete-habit-btn" onclick="triggerDeleteHabit(${habit.id})">🗑️</button>
                        </div>
                    </div>
                `;

                let gridHTML = `<div class="days-grid">`;
                for (let i = 0; i < 30; i++) {
                    let dayStatus = habit.days[i];
                    let classList = "day-box";
                    let textInside = `ว.${i+1}`;
                    let clickAction = "";

                    if (dayStatus === true) {
                        classList += " completed";
                        textInside += `<div class="pts">+${habit.historyPoints[i]}</div>`;
                    } else if (dayStatus === false) {
                        classList += " disabled";
                        textInside += `<div class="pts" style="color:var(--danger);">❌</div>`;
                    }

                    // เงื่อนไขล็อกตามวันปัจจุบัน (เนื่องจากเริ่มต้นวันที่ 1 หรือ Index 0 ช่องอื่นๆ จึงจะถูกล็อกอัตโนมัติ)
                    if (i < window.currentSystemDayIndex && dayStatus === null) {
                        classList += " disabled"; 
                    } else if (i === window.currentSystemDayIndex && dayStatus === null) {
                        clickAction = `onclick="triggerCheckIn(${habit.id}, ${i})"`;
                    } else if (i > window.currentSystemDayIndex) {
                        classList += " disabled"; 
                    }

                    gridHTML += `<div class="${classList}" ${clickAction}>${textInside}</div>`;
                }
                gridHTML += `</div>`;

                card.innerHTML = headerHTML + gridHTML;
                container.appendChild(card);
            });
        }

        function triggerCheckIn(habitId, dayIndex) {
            const habit = habits.find(h => h.id === habitId);
            if (!habit) return;

            if (dayIndex > 0 && (habit.days[dayIndex - 1] === false || habit.days[dayIndex - 1] === null)) {
                habit.nextEarnPoint = 5;
                habit.currentStreak = 0;
            }

            habit.days[dayIndex] = true;
            habit.historyPoints[dayIndex] = habit.nextEarnPoint;
            habit.currentStreak += 1;

            let nextPoint = habit.nextEarnPoint + 1;
            if (nextPoint > 8) nextPoint = 8;
            habit.nextEarnPoint = nextPoint;

            saveUserData();
            updateTotalPoints();
            renderHabits();
        }

        function updateTotalPoints() {
            let grandTotal = 0;
            habits.forEach(habit => {
                grandTotal += habit.historyPoints.reduce((sum, current) => sum + current, 0);
            });
            document.getElementById('total-points').innerText = grandTotal;
            return grandTotal;
        }

        function triggerMonthlySummary() {
            const container = document.getElementById('monthly-result-container');
            container.style.display = "block";

            let htmlContent = `<div style="font-weight:bold; border-bottom: 1px solid var(--success); padding-bottom:4px; margin-bottom:8px; color:var(--accent);">📊 สรุปผลรายเดือน (30 วัน)</div>`;
            let grandTotalPoints = updateTotalPoints();

            if(habits.length === 0) {
                container.innerHTML = "ไม่มีข้อมูลกิจวัตร";
                return;
            }

            habits.forEach(habit => {
                let habitMonthlyPoints = habit.historyPoints.reduce((sum, score) => sum + score, 0);
                let habitMonthlySuccessCount = habit.days.filter(d => d === true).length;

                htmlContent += `
                    <div class="report-item">
                        <span><b>${habit.name}</b></span>
                        <span>สำเร็จ <b>${habitMonthlySuccessCount}/30</b> วัน | <b>+${habitMonthlyPoints}</b> Pts</span>
                    </div>
                `;
            });

            const currentDisplayUser = document.getElementById('username').value.trim() || "Guest";
            htmlContent += `
                <div style="margin-top: 10px; font-weight: bold; text-align: right; color:#6ee7b7; font-size:0.85rem;">
                    แต้มสุทธิของ ${currentDisplayUser}: <span style="color:black; background:var(--accent); padding:2px 6px; border-radius:4px;">${grandTotalPoints} Points</span>
                </div>
            `;
            container.innerHTML = htmlContent;
        }
    </script>
</body>
</html>
